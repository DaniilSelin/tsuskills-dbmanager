postgres:
  pool:
    ConnConfig:
      Host: "postgres-vacancies"
      Port: 5432
      Database: "tsuskills_vacancies"
      User: "postgres"
      Password: "postgres"
      SSLMode: "disable"
      ConnectTimeout: 5
    MaxConns: 10
    MinConns: 2
    MaxConnLifetime: 30m
    MaxConnIdleTime: 5m
    HealthCheckPeriod: 30s
  ConnectRetries: 5
  ConnectRetryDelay: 3s
  Schema: "vacancies"
  MigrationsPath: "internal/infra/postgres/migrations"

opensearch:
  connect:
    retries: 5
    delay: 5s
  client:
    addresses:
      - "http://opensearch:9200"

server:
  host: 0.0.0.0
  port: 8080
  ReadTimeout: 15s
  WriteTimeout: 15s
  IdleTimeout: 60s
  ShutDownTimeOut: 30s

logger:
  logger:
    Level: "info"
    Development: false
    Encoding: "json"
    OutputPaths: ["stdout"]
    ErrorOutputPaths: ["stderr"]
    EncoderConfig:
      MessageKey: "message"
      LevelKey: "level"
      TimeKey: "timestamp"
